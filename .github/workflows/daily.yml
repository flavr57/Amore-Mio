name: Amore Mio — Morning Edition

on:
  schedule:
    # 6am PT — 14:00 UTC covers 6am PST (winter) and 7am PDT (summer)
    # Change to 13:00 UTC if you prefer exactly 6am during daylight saving time
    - cron: '0 14 * * *'
  workflow_dispatch:  # allow manual run from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push index.html back to main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's newspaper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push index.html
        run: |
          git config user.name "Amore Mio Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          if git diff --staged --quiet; then
            echo "No changes to index.html — skipping commit"
          else
            DATE_LABEL=$(python -c "
          import datetime
          d = datetime.date.today()
          print(f'{d.strftime(\"%B\")} {d.day}, {d.year}')
          ")
            git commit -m "Morning edition — ${DATE_LABEL}"
            git push
          fi

      - name: Send SMS notification
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMS_PHONE: ${{ secrets.SMS_PHONE }}
        run: |
          python - <<'EOF'
          import os, smtplib
          from email.mime.text import MIMEText

          gmail   = os.environ["GMAIL_ADDRESS"]
          app_pw  = os.environ["GMAIL_APP_PASSWORD"]
          phone   = os.environ["SMS_PHONE"]

          to_addr = f"{phone}@tmomail.net"
          body    = "Good morning! Your paper is ready ☕\nhttps://flavr57.github.io/Amore-Mio/"

          msg = MIMEText(body)
          msg["From"]    = gmail
          msg["To"]      = to_addr
          msg["Subject"] = ""

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(gmail, app_pw)
              server.sendmail(gmail, to_addr, msg.as_string())

          print(f"SMS sent to {to_addr}")
          EOF
